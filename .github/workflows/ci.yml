name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Make sure the app at least starts (smoke test)
      - name: Smoke test the app
        run: |
          node index.js &
          APP_PID=$!
          sleep 3
          curl --fail http://localhost:3000/health
          kill $APP_PID

      # Step 5: Build the Docker image
      - name: Build Docker image
        run: docker build -t order-api:ci .

      # Step 6: Verify the image runs
      - name: Verify Docker image works
        run: |
          docker run -d -p 3000:3000 --name test-container order-api:ci
          sleep 5
          curl --fail http://localhost:3000/health
          docker stop test-container
          docker rm test-container