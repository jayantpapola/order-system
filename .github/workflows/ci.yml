name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Smoke test the app
        run: |
          node index.js &
          APP_PID=$!
          sleep 3
          curl --fail http://localhost:3000/health
          kill $APP_PID
          sleep 2     # let port 3000 fully release

      - name: Build Docker image
        run: docker build -t order-api:ci .

      - name: Verify Docker image works
        run: |
          docker run -d -p 3000:3000 --name test-container order-api:ci
          sleep 5
          curl --fail http://localhost:3000/health
          docker stop test-container
          docker rm test-container