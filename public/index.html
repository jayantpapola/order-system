<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Order System</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
        color: #fff;
        background-color: #222;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 24px;
      }
      form {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      input {
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.95rem;
      }
      button {
        padding: 8px 16px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.95rem;
      }
      button:hover {
        background: #1d4ed8;
      }
      #msg {
        font-size: 0.9rem;
        min-height: 1.2em;
        margin-bottom: 12px;
      }
      .ok {
        color: #16a34a;
      }
      .err {
        color: #dc2626;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th {
        text-align: left;
        border-bottom: 2px solid #e5e7eb;
        padding: 6px 8px;
        color: #555;
      }
      td {
        padding: 6px 8px;
        border-bottom: 1px solid #f0f0f0;
      }
      #refresh {
        background: #6b7280;
        margin-bottom: 12px;
      }
      #refresh:hover {
        background: #4b5563;
      }
    </style>
  </head>
  <body>
    <h1>Order System</h1>

    <form id="orderForm">
      <input id="item" placeholder="Item name" required />
      <input id="amount" type="number" placeholder="Amount" min="1" required />
      <button type="submit">Create Order</button>
    </form>

    <div id="msg"></div>
    <button id="refresh">Refresh</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Item</th>
          <th>Amount</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody id="orderList"></tbody>
    </table>

    <script>
      const msg = document.getElementById("msg");
      const list = document.getElementById("orderList");

      async function loadOrders() {
        try {
          const res = await fetch("/orders");
          const orders = await res.json();
          list.innerHTML = orders
            .slice()
            .reverse()
            .map(
              (o) => `<tr>
            <td>${o.id}</td>
            <td>${o.item}</td>
            <td>${o.amount}</td>
            <td>${new Date(o.createdAt).toLocaleString()}</td>
          </tr>`,
            )
            .join("");
        } catch (e) {
          msg.textContent = "Failed to load orders.";
          msg.className = "err";
        }
      }

      document
        .getElementById("orderForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const item = document.getElementById("item").value.trim();
          const amount = Number(document.getElementById("amount").value);
          try {
            const res = await fetch("/orders", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ item, amount }),
            });
            const order = await res.json();
            msg.textContent = `Order created: ${order.id} (${order.item})`;
            msg.className = "ok";
            e.target.reset();
            await loadOrders();
          } catch (e) {
            msg.textContent = "Failed to create order.";
            msg.className = "err";
          }
        });

      document.getElementById("refresh").addEventListener("click", loadOrders);

      loadOrders();
    </script>
  </body>
</html>
